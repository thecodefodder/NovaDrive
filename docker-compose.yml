services:
  web:
    build: .
    image: ghcr.io/cachenetworks/novadrive:main
    command: ["waitress-serve", "--host=0.0.0.0", "--port=5000", "--call", "novadrive.app:create_app"]
    env_file:
      - .env
    environment:
      DISCORD_BOT_BRIDGE_URL: http://bot:5051
    ports:
      - "5000:5000"
    volumes:
      - novadrive-instance:/app/instance
    depends_on:
      bot:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  bot:
    build: .
    image: ghcr.io/cachenetworks/novadrive:main
    command: ["python", "-m", "novadrive.discord_bot"]
    env_file:
      - .env
    environment:
      DISCORD_BOT_BRIDGE_URL: http://0.0.0.0:5051
    volumes:
      - novadrive-instance:/app/instance
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; req = urllib.request.Request('http://127.0.0.1:5051/health', headers={'X-NovaDrive-Bridge-Secret': os.environ.get('DISCORD_BOT_BRIDGE_SHARED_SECRET', 'novadrive-local-secret')}); urllib.request.urlopen(req, timeout=5).read()"]
      interval: 15s
      timeout: 7s
      retries: 8
      start_period: 20s
    restart: unless-stopped

volumes:
  novadrive-instance:
